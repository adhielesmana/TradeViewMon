services:
  ml-sidecar:
    build:
      context: ..
      dockerfile: deploy/ml-sidecar.Dockerfile
    container_name: trady-ml-sidecar
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ML_SIDECAR_PORT:-8001}:8001"
    environment:
      ML_SIDECAR_PORT: "8001"
      ML_ACTIVE_CHECKPOINT: "${ML_ACTIVE_CHECKPOINT:-stock-ensemble-v1}"
      TZ: "${TZ:-Asia/Jakarta}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - trady-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: trady
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-trady}:${POSTGRES_PASSWORD}@trady-db:5432/${POSTGRES_DB:-trady}"
      SESSION_SECRET: "${SESSION_SECRET}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ML_SIDECAR_URL: "http://ml-sidecar:8001"
      USE_HTTPS: "${USE_HTTPS:-false}"
      TZ: "${TZ:-Asia/Jakarta}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      ml-sidecar:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - trady-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: trady-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-trady}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-trady}"
      TZ: "${TZ:-Asia/Jakarta}"
      PGTZ: "${TZ:-Asia/Jakarta}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - trady-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trady} -d ${POSTGRES_DB:-trady}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  trady-network:
    driver: bridge

volumes:
  postgres_data:
